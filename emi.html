<html>
    <body>
        <h1 align="center">SBI BANK EMI CALCULATOR</h1>
        <style>
            input[type=text]
            {
                width:100%;
                border: 2px solid black;
                background-color:pink;
                padding: 10px;
                margin: 10px;
                font-size: 20px;
            }
            input[type=number]
            {
                width:100%;
                border: 2px solid black;
                background-color:#C8A2C8;
                padding: 10px;
                margin: 10px;
                font-size: 20px;
            }
            input[type=button]
            {
                border: 2px solid black;
                background-color:#ADD8E6;
                padding: 10px;
                margin: 10px;
                font-size: 20px;
            }
        </style>
        <form>
            Name <input type="text" placeholder="enter your name"> <br>
            Occupation <input type="text" placeholder="enter your occupation"> <br>
            Loan amount <input type="number" id="amt" placeholder="enter loan amt"> <br>
            Interest rate <input type="number" id="roi" placeholder="enter ROI"> <br>
            Tenure <input type="number" id="t" placeholder="enter tenure in yr"> <br>
            <input type="button" value="Calculate EMI" onclick="calculateEMI()">
        </form>
       
        <h2 id="result"></h2>

        <script>
            function calculateEMI()
            {
                var A=Number(document.getElementById("amt").value);
                var I=Number(document.getElementById("roi").value);
                var T=Number(document.getElementById("t").value);
               
                var mir=(I/12)/100;
                var months=T*12;
               
                var emi=(A*mir*Math.pow(1+mir,months))/(Math.pow(1 + mir, months) - 1);
               
                document.getElementById("result").innerText="Your EMI is: " + emi.toFixed(2);
            }
        </script>
        <h3 align="right"> Pavani Rangineni</h3>
        <h3 align="right"> 24881A1253 </h3>
    </body>
</html>
