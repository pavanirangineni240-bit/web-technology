<html>
    <body bgcolor="lightGreen" align="center">
        <h2>JOB REGISTRATION FORM</h2>
        <form action="sucess.html"> 
            <table align="center" >
                <tr>
                    <td>NAME</td>
                    <td><input type="text" placeholder="enter your name"></td>
                </tr>
                <tr>
                    <td>GENDER</td>
                    <td>
                        <input type="radio" name="gender">male<br>
                        <input type="radio" name="gender">female<br>
                        <input type="radio" name="gender">other<br>
                    </td>
                </tr>
                <tr>
                    <td>LANGUAGES KNOWN</td>
                    <td><input type="checkbox">english
                        <input type="checkbox">hindi
                        <input type="checkbox">tamil
                        <input type="checkbox">telugu
                    </td>
                </tr>
                <tr>
                    <td>EMAIL</td>
                    <td><input type="text" placeholder="enter your email"></td>
                </tr>
                <tr>
                    <td>MOBILE NUMBER</td>
                    <td><input type="text" placeholder="enter your mobile number"></td>
                </tr>
                <tr>
                    <td>ADDRESS</td>
                    <td><textarea cols="10" rows="5"></textarea></td>
                </tr>
                <tr>
                    <td>JOB LOCATION</td>
                    <td>
                        <select>
                            <option>hyderabad</option>
                            <option>chennai</option>
                            <option>bangalore</option>
                            <option>delhi</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td>UPLOAD RESUME</td>
                    <td><input type="file"></td>
                </tr>
                <tr><td>
                        <input type="submit">
                        <input type="reset">
                    </td>
                </tr>
            </table>
        </form>
    </body>
     <P ALIGN="middle">Pavani Rangineni</P>

</html>
